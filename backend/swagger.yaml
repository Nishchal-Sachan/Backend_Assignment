openapi: 3.0.0
info:
  title: TaskMaster REST API
  description: A scalable REST API with Authentication & Role-Based Access for managing tasks.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
    Task:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [pending, in-progress, completed]
        user:
          type: object
          properties:
            _id:
              type: string
            name:
              type: string
            email:
              type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
security:
  - bearerAuth: []
paths:
  /auth/register:
    post:
      summary: Register a new user
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [user, admin]
      responses:
        '201':
          description: User registered successfully
        '400':
          description: Bad request / validation error
  /auth/login:
    post:
      summary: Log in to an existing account
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Successful login
        '401':
          description: Invalid credentials
  /auth/me:
    get:
      summary: Get current authenticated user
      tags:
        - Authentication
      responses:
        '200':
          description: Returns user details
        '401':
          description: Unauthorized
  /tasks:
    get:
      summary: Get all tasks (User sees own tasks, Admin sees all)
      tags:
        - Tasks
      responses:
        '200':
          description: List of tasks
    post:
      summary: Create a new task
      tags:
        - Tasks
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - description
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [pending, in-progress, completed]
      responses:
        '201':
          description: Task created
        '400':
          description: Missing fields
  /tasks/{id}:
    put:
      summary: Update a task
      tags:
        - Tasks
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Task ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [pending, in-progress, completed]
      responses:
        '200':
          description: Task updated
        '404':
          description: Task not found
        '401':
          description: Unauthorized
    delete:
      summary: Delete a task
      tags:
        - Tasks
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: Task ID
      responses:
        '200':
          description: Task deleted
        '404':
          description: Task not found
        '401':
          description: Unauthorized
